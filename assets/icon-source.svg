<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5B6CFF"/>
      <stop offset="1" stop-color="#9A5CF6"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#231B4F" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>

  <!-- speech bubble (white) with tail -->
  <g filter="url(#soft)">
    <path d="M152 376 L184 322 L244 322 Z" fill="#FFFFFF"/>
    <rect x="100" y="118" width="312" height="208" rx="54" fill="#FFFFFF"/>
  </g>

  <!-- intonation rise-fall curve (quick rise, long fall) -->
  <path d="M150 280 C 190 280 208 174 238 172 C 288 169 322 286 366 286"
        fill="none" stroke="#FF6A3D" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- nuclear-stress beat dot at the peak -->
  <circle cx="238" cy="172" r="14" fill="#FFFFFF"/>
  <circle cx="238" cy="172" r="14" fill="none" stroke="#FF6A3D" stroke-width="6"/>
</svg>
